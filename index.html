<!doctype html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#2563EB" />

    <title>Saarthi — Your co-pilot for safer drives</title>
    <meta
      name="description"
      content="Saarthi turns your phone into a real-time driver-safety co-pilot. Gentle, timely alerts that keep drivers alert and focused — no extra hardware, on iOS and Android."
    />

    <!-- Open Graph / social -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Saarthi — Your co-pilot for safer drives" />
    <meta
      property="og:description"
      content="Real-time driver safety, right from your phone. No extra hardware. iOS and Android."
    />
    <meta property="og:image" content="/og-image.svg" />
    <meta name="twitter:card" content="summary_large_image" />

    <!-- Prevent a flash of the wrong theme before React mounts. -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('saarthi-theme')
          var systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches
          var dark = stored ? stored === 'dark' : systemDark
          if (dark) document.documentElement.classList.add('dark')
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
